<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WarCraft RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e}
#game{position:fixed;top:0;left:0;width:100%;height:100%}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#ui>*{pointer-events:auto}
.hud{position:absolute;background:rgba(0,0,0,0.8);border:2px solid #4a90d9;border-radius:8px;color:#fff;font-family:Arial,sans-serif}
.hp-bar{position:absolute;height:6px;background:#333;border-radius:3px;overflow:hidden}
.hp-fill{height:100%;background:linear-gradient(90deg,#4caf50,#8bc34a);transition:width 0.2s}
.btn{position:absolute;background:linear-gradient(180deg,#4a90d9,#2a6099);border:2px solid #6ab0f9;border-radius:50%;color:#fff;font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 8px rgba(0,0,0,0.5)}
.btn:active{transform:scale(0.95);background:linear-gradient(180deg,#2a6099,#1a4069)}
.skill-btn{position:absolute;width:60px;height:60px;background:linear-gradient(180deg,#666,#333);border:3px solid #999;border-radius:8px;color:#fff;font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
.skill-btn.ready{background:linear-gradient(180deg,#4a90d9,#2a6099);border-color:#6ab0f9}
.skill-btn.cooldown{opacity:0.5}
#joystick{position:absolute;width:120px;height:120px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.3);border-radius:50%;display:none}
#joystick-knob{position:absolute;width:50px;height:50px;background:rgba(74,144,217,0.8);border-radius:50%;top:35px;left:35px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="hud" style="top:10px;left:10px;width:200px;height:80px;padding:8px">
    <div style="color:#ffd700;font-size:18px;font-weight:bold">Lv.<span id="lv">1</span> <span id="class">Warrior</span></div>
    <div style="margin-top:4px;font-size:12px">HP: <span id="hp">100</span>/<span id="maxhp">100</span></div>
    <div style="margin-top:2px;font-size:12px">MP: <span id="mp">50</span>/<span id="maxmp">50</span></div>
    <div style="margin-top:2px;font-size:12px">EXP: <span id="exp">0</span>/<span id="expneed">100</span></div>
  </div>
  <div class="hud" style="top:10px;right:10px;width:150px;height:60px;padding:8px;text-align:right">
    <div style="color:#ffd700;font-size:16px">Wave <span id="wave">1</span></div>
    <div style="font-size:12px;margin-top:4px">Next: <span id="nextwave">30</span>s</div>
    <div style="font-size:12px">Kills: <span id="kills">0</span></div>
  </div>
  <div id="joystick" style="bottom:150px;left:30px"><div id="joystick-knob"></div></div>
  <div class="skill-btn ready" style="bottom:20px;right:20px" data-skill="0"><div>Q</div><div style="font-size:10px">Attack</div></div>
  <div class="skill-btn ready" style="bottom:20px;right:90px" data-skill="1"><div>W</div><div style="font-size:10px">Spin</div></div>
  <div class="skill-btn ready" style="bottom:20px;right:160px" data-skill="2"><div>E</div><div style="font-size:10px">Heal</div></div>
  <div class="skill-btn ready" style="bottom:20px;right:230px" data-skill="3"><div>R</div><div style="font-size:10px">Ulti</div></div>
  <div class="btn" style="bottom:100px;right:20px;width:50px;height:50px;font-size:20px" id="btn-attack">⚔</div>
  <div id="msg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffd700;font-size:24px;font-weight:bold;text-shadow:2px 2px 4px #000;display:none;text-align:center"></div>
</div>

<script>
(function(){
// Game Constants
var TILE_SIZE=40;
var MAP_WIDTH=30;
var MAP_HEIGHT=20;
var SCREEN_WIDTH=window.innerWidth;
var SCREEN_HEIGHT=window.innerHeight;

// Canvas Setup
var canvas=document.getElementById('game');
var ctx=canvas.getContext('2d');
canvas.width=SCREEN_WIDTH;
canvas.height=SCREEN_HEIGHT;

// Camera
var camera={x:0,y:0};

// Input
var keys={};
var mouse={x:0,y:0,down:false};
var joystick={active:false,x:0,y:0,dx:0,dy:0};

// Game State
var gameState='playing'; // playing, paused, gameover
var wave=1;
var waveTimer=30;
var kills=0;

// Player
var player={
  x:MAP_WIDTH*TILE_SIZE/2,
  y:MAP_HEIGHT*TILE_SIZE/2,
  vx:0,vy:0,
  hp:100,maxHp:100,
  mp:50,maxMp:50,
  level:1,exp:0,expNeed:100,
  atk:15,def:5,
  speed:3,
  class:'Warrior',
  skills:[
    {name:'Attack',cd:0,maxCd:0.5,dmg:1.0},
    {name:'Spin',cd:0,maxCd:3,dmg:2.0,aoe:true},
    {name:'Heal',cd:0,maxCd:8,heal:30},
    {name:'Ultimate',cd:0,maxCd:20,dmg:5.0}
  ],
  facing:1 // 1=right, -1=left
};

// Entities
var enemies=[];
var projectiles=[];
var particles=[];
var items=[];
var spawnPoints=[];

// Map
var map=[];
for(var y=0;y<MAP_HEIGHT;y++){
  map[y]=[];
  for(var x=0;x<MAP_WIDTH;x++){
    map[y][x]=0; // 0=ground, 1=wall
  }
}
// Add walls around border
for(var x=0;x<MAP_WIDTH;x++){map[0][x]=1;map[MAP_HEIGHT-1][x]=1;}
for(var y=0;y<MAP_HEIGHT;y++){map[y][0]=1;map[y][MAP_WIDTH-1]=1;}
// Add some obstacles
map[5][5]=1;map[5][6]=1;map[6][5]=1;map[6][6]=1;
map[10][15]=1;map[10][16]=1;map[11][15]=1;map[11][16]=1;
map[15][8]=1;map[15][9]=1;map[16][8]=1;map[16][9]=1;

// Spawn points
spawnPoints=[
  {x:2*TILE_SIZE,y:2*TILE_SIZE},
  {x:(MAP_WIDTH-2)*TILE_SIZE,y:2*TILE_SIZE},
  {x:2*TILE_SIZE,y:(MAP_HEIGHT-2)*TILE_SIZE},
  {x:(MAP_WIDTH-2)*TILE_SIZE,y:(MAP_HEIGHT-2)*TILE_SIZE}
];

// Classes
function Enemy(x,y,type){
  this.x=x;this.y=y;
  this.type=type||'goblin';
  this.hp=type==='boss'?500:40+wave*10;
  this.maxHp=this.hp;
  this.atk=type==='boss'?30:5+wave*2;
  this.def=type==='boss'?15:2+wave;
  this.speed=type==='boss'?1:1.5;
  this.exp=type==='boss'?200:20+wave*5;
  this.vx=0;this.vy=0;
  this.atkTimer=0;
  this.color=type==='boss'?'#ffd600':type==='orc'?'#8d6e63':type==='skeleton'?'#e0e0e0':'#66bb6a';
  this.size=type==='boss'?35:20;
}
Enemy.prototype.update=function(){
  // AI: Move toward player
  var dx=player.x-this.x;
  var dy=player.y-this.y;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>40){
    this.vx=(dx/dist)*this.speed;
    this.vy=(dy/dist)*this.speed;
  }else{
    this.vx=0;this.vy=0;
    // Attack player
    this.atkTimer++;
    if(this.atkTimer>=60){
      this.atkTimer=0;
      var dmg=Math.max(1,this.atk-player.def);
      player.hp-=dmg;
      addParticle(player.x,player.y-30,'-'+dmg,'#ff5252',16);
      updateHUD();
      if(player.hp<=0)gameOver();
    }
  }
  // Collision with walls
  var newX=this.x+this.vx;
  var newY=this.y+this.vy;
  if(!isWall(newX,this.y))this.x=newX;
  if(!isWall(this.x,newY))this.y=newY;
};
Enemy.prototype.draw=function(){
  var sx=this.x-camera.x;
  var sy=this.y-camera.y;
  // Body
  ctx.fillStyle=this.color;
  ctx.beginPath();
  ctx.arc(sx,sy,this.size,0,Math.PI*2);
  ctx.fill();
  // Eyes
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.arc(sx-this.size*0.3,sy-this.size*0.2,this.size*0.15,0,Math.PI*2);
  ctx.arc(sx+this.size*0.3,sy-this.size*0.2,this.size*0.15,0,Math.PI*2);
  ctx.fill();
  // HP bar
  if(this.hp<this.maxHp){
    ctx.fillStyle='#333';
    ctx.fillRect(sx-20,sy-this.size-10,40,5);
    ctx.fillStyle=this.hp/this.maxHp>0.5?'#4caf50':this.hp/this.maxHp>0.25?'#ff9800':'#f44336';
    ctx.fillRect(sx-20,sy-this.size-10,40*(this.hp/this.maxHp),5);
  }
};

function Projectile(x,y,vx,vy,dmg,isPlayer){
  this.x=x;this.y=y;
  this.vx=vx;this.vy=vy;
  this.dmg=dmg;
  this.isPlayer=isPlayer;
  this.life=60;
}
Projectile.prototype.update=function(){
  this.x+=this.vx;
  this.y+=this.vy;
  this.life--;
  // Check collision
  if(this.isPlayer){
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      var dist=Math.sqrt((this.x-e.x)**2+(this.y-e.y)**2);
      if(dist<e.size+10){
        var dmg=Math.max(1,this.dmg-e.def);
        e.hp-=dmg;
        addParticle(e.x,e.y-30,'-'+dmg,'#ff6f00',18);
        if(e.hp<=0){
          killEnemy(e,i);
          i--;
        }
        return false;
      }
    }
  }
  return this.life>0&&!isWall(this.x,this.y);
};
Projectile.prototype.draw=function(){
  ctx.fillStyle=this.isPlayer?'#4fc3f7':'#ef5350';
  ctx.beginPath();
  ctx.arc(this.x-camera.x,this.y-camera.y,6,0,Math.PI*2);
  ctx.fill();
};

function Particle(x,y,text,color,size){
  this.x=x;this.y=y;
  this.text=text;
  this.color=color;
  this.size=size||16;
  this.vy=-2;
  this.alpha=1;
  this.life=40;
}
Particle.prototype.update=function(){
  this.y+=this.vy;
  this.vy+=0.1;
  this.alpha-=0.025;
  return this.alpha>0;
};
Particle.prototype.draw=function(){
  ctx.save();
  ctx.globalAlpha=this.alpha;
  ctx.fillStyle=this.color;
  ctx.strokeStyle='#000';
  ctx.lineWidth=2;
  ctx.font='bold '+this.size+'px Arial';
  ctx.textAlign='center';
  ctx.strokeText(this.text,this.x-camera.x,this.y-camera.y);
  ctx.fillText(this.text,this.x-camera.x,this.y-camera.y);
  ctx.restore();
};

// Helpers
function isWall(x,y){
  var tx=Math.floor(x/TILE_SIZE);
  var ty=Math.floor(y/TILE_SIZE);
  return tx<0||tx>=MAP_WIDTH||ty<0||ty>=MAP_HEIGHT||map[ty][tx]===1;
}

function addParticle(x,y,text,color,size){
  particles.push(new Particle(x,y,text,color,size));
}

function killEnemy(e,index){
  kills++;
  player.exp+=e.exp;
  addParticle(e.x,e.y,'+'+e.exp+' EXP','#2196f3',14);
  enemies.splice(index,1);
  // Level up check
  while(player.exp>=player.expNeed){
    player.exp-=player.expNeed;
    player.level++;
    player.expNeed=Math.floor(100*Math.pow(player.level,1.2));
    player.maxHp+=20;player.hp=player.maxHp;
    player.maxMp+=10;player.mp=player.maxMp;
    player.atk+=3;player.def+=1;
    addParticle(player.x,player.y-50,'LEVEL UP!','#ffd700',24);
    showMessage('Level Up! Lv.'+player.level);
  }
  updateHUD();
}

function showMessage(text){
  var msg=document.getElementById('msg');
  msg.textContent=text;
  msg.style.display='block';
  setTimeout(function(){msg.style.display='none';},2000);
}

function updateHUD(){
  document.getElementById('lv').textContent=player.level;
  document.getElementById('hp').textContent=Math.floor(player.hp);
  document.getElementById('maxhp').textContent=player.maxHp;
  document.getElementById('mp').textContent=Math.floor(player.mp);
  document.getElementById('maxmp').textContent=player.maxMp;
  document.getElementById('exp').textContent=Math.floor(player.exp);
  document.getElementById('expneed').textContent=player.expNeed;
  document.getElementById('wave').textContent=wave;
  document.getElementById('kills').textContent=kills;
  // Update skill buttons
  for(var i=0;i<4;i++){
    var btn=document.querySelector('[data-skill="'+i+'"]');
    var cd=player.skills[i].cd;
    if(cd>0){
      btn.classList.add('cooldown');
      btn.classList.remove('ready');
      btn.children[1].textContent=Math.ceil(cd)+'s';
    }else{
      btn.classList.remove('cooldown');
      btn.classList.add('ready');
      btn.children[1].textContent=player.skills[i].name;
    }
  }
}

function gameOver(){
  gameState='gameover';
  showMessage('GAME OVER\nKills: '+kills+'\nWave: '+wave);
  setTimeout(function(){location.reload();},3000);
}

// Input handling
document.addEventListener('keydown',function(e){keys[e.key]=true;});
document.addEventListener('keyup',function(e){keys[e.key]=false;});

canvas.addEventListener('mousedown',function(e){
  mouse.down=true;
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});
canvas.addEventListener('mouseup',function(){mouse.down=false;});
canvas.addEventListener('mousemove',function(e){
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// Touch controls for mobile
var joystickEl=document.getElementById('joystick');
var joystickKnob=document.getElementById('joystick-knob');
var joystickCenter={x:0,y:0};

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var touch=e.touches[0];
  // Left side = joystick
  if(touch.clientX<SCREEN_WIDTH/2){
    joystick.active=true;
    joystickEl.style.display='block';
    joystickEl.style.left=(touch.clientX-60)+'px';
    joystickEl.style.top=(touch.clientY-60)+'px';
    joystickCenter.x=touch.clientX;
    joystickCenter.y=touch.clientY;
  }
});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(joystick.active){
    var touch=e.touches[0];
    var dx=touch.clientX-joystickCenter.x;
    var dy=touch.clientY-joystickCenter.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var maxDist=35;
    if(dist>maxDist){dx=dx/dist*maxDist;dy=dy/dist*maxDist;}
    joystickKnob.style.left=(35+dx)+'px';
    joystickKnob.style.top=(35+dy)+'px';
    joystick.dx=dx/maxDist;
    joystick.dy=dy/maxDist;
  }
});

canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  joystick.active=false;
  joystickEl.style.display='none';
  joystick.dx=0;joystick.dy=0;
});

// Skill buttons
document.querySelectorAll('.skill-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var idx=parseInt(this.dataset.skill);
    useSkill(idx);
  });
});

document.getElementById('btn-attack').addEventListener('click',function(){
  useSkill(0);
});

function useSkill(idx){
  var skill=player.skills[idx];
  if(skill.cd>0)return;
  if(player.mp<5)return;
  
  skill.cd=skill.maxCd;
  player.mp-=5;
  updateHUD();
  
  if(idx===0){// Attack
    // Find nearest enemy
    var nearest=null,minDist=Infinity;
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      var dist=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2);
      if(dist<minDist){minDist=dist;nearest=e;}
    }
    if(nearest&&minDist<150){
      // Shoot projectile
      var dx=nearest.x-player.x;
      var dy=nearest.y-player.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      projectiles.push(new Projectile(player.x,player.y,dx/dist*8,dy/dist*8,player.atk*skill.dmg,true));
    }
  }else if(idx===1){// Spin AOE
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      var dist=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2);
      if(dist<100){
        var dmg=Math.max(1,player.atk*skill.dmg-e.def);
        e.hp-=dmg;
        addParticle(e.x,e.y-30,'-'+dmg,'#ff6f00',18);
        if(e.hp<=0){killEnemy(e,i);i--;}
      }
    }
    addParticle(player.x,player.y,'SPIN!','#4fc3f7',20);
  }else if(idx===2){// Heal
    player.hp=Math.min(player.maxHp,player.hp+skill.heal);
    addParticle(player.x,player.y-30,'+'+skill.heal,'#4caf50',18);
    updateHUD();
  }else if(idx===3){// Ultimate
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      var dmg=Math.max(1,player.atk*skill.dmg-e.def);
      e.hp-=dmg;
      addParticle(e.x,e.y-30,'-'+dmg,'#ffd700',22);
      if(e.hp<=0){killEnemy(e,i);i--;}
    }
    addParticle(player.x,player.y,'ULTIMATE!','#ffd700',28);
  }
}

// Game Loop
function update(){
  if(gameState!=='playing')return;
  
  // Player movement
  var moveX=0,moveY=0;
  if(keys['w']||keys['ArrowUp'])moveY=-1;
  if(keys['s']||keys['ArrowDown'])moveY=1;
  if(keys['a']||keys['ArrowLeft'])moveX=-1;
  if(keys['d']||keys['ArrowRight'])moveX=1;
  if(joystick.active){moveX=joystick.dx;moveY=joystick.dy;}
  
  if(moveX!==0||moveY!==0){
    var len=Math.sqrt(moveX*moveX+moveY*moveY);
    moveX/=len;moveY/=len;
    player.vx=moveX*player.speed;
    player.vy=moveY*player.speed;
    player.facing=moveX>0?1:-1;
  }else{
    player.vx*=0.8;player.vy*=0.8;
  }
  
  // Collision
  var newX=player.x+player.vx;
  var newY=player.y+player.vy;
  if(!isWall(newX,player.y))player.x=newX;
  if(!isWall(player.x,newY))player.y=newY;
  
  // Keep in bounds
  player.x=Math.max(20,Math.min(MAP_WIDTH*TILE_SIZE-20,player.x));
  player.y=Math.max(20,Math.min(MAP_HEIGHT*TILE_SIZE-20,player.y));
  
  // MP regen
  if(player.mp<player.maxMp)player.mp+=0.05;
  
  // Skill cooldowns
  for(var i=0;i<player.skills.length;i++){
    if(player.skills[i].cd>0)player.skills[i].cd-=0.016;
  }
  
  // Camera follow player
  camera.x=player.x-SCREEN_WIDTH/2;
  camera.y=player.y-SCREEN_HEIGHT/2;
  camera.x=Math.max(0,Math.min(MAP_WIDTH*TILE_SIZE-SCREEN_WIDTH,camera.x));
  camera.y=Math.max(0,Math.min(MAP_HEIGHT*TILE_SIZE-SCREEN_HEIGHT,camera.y));
  
  // Spawn enemies
  waveTimer-=0.016;
  if(waveTimer<=0){
    waveTimer=30;
    wave++;
    showMessage('Wave '+wave);
    var count=3+Math.floor(wave/2);
    for(var i=0;i<count;i++){
      var sp=spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
      enemies.push(new Enemy(sp.x+Math.random()*40-20,sp.y+Math.random()*40-20,wave%5===0?'boss':'goblin'));
    }
  }
  document.getElementById('nextwave').textContent=Math.ceil(waveTimer);
  
  // Update entities
  for(var i=0;i<enemies.length;i++)enemies[i].update();
  for(var i=projectiles.length-1;i>=0;i--){
    if(!projectiles[i].update())projectiles.splice(i,1);
  }
  for(var i=particles.length-1;i>=0;i--){
    if(!particles[i].update())particles.splice(i,1);
  }
  
  updateHUD();
}

function draw(){
  // Clear
  ctx.fillStyle='#0d1b2a';
  ctx.fillRect(0,0,SCREEN_WIDTH,SCREEN_HEIGHT);
  
  // Draw map
  for(var y=0;y<MAP_HEIGHT;y++){
    for(var x=0;x<MAP_WIDTH;x++){
      var sx=x*TILE_SIZE-camera.x;
      var sy=y*TILE_SIZE-camera.y;
      if(sx>-TILE_SIZE&&sx<SCREEN_WIDTH&&sy>-TILE_SIZE&&sy<SCREEN_HEIGHT){
        if(map[y][x]===1){
          ctx.fillStyle='#4a4a6a';
          ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
          ctx.strokeStyle='#6a6a8a';
          ctx.strokeRect(sx,sy,TILE_SIZE,TILE_SIZE);
        }else{
          ctx.fillStyle=((x+y)%2===0)?'#1a2a3a':'#152535';
          ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
        }
      }
    }
  }
  
  // Draw spawn points
  for(var i=0;i<spawnPoints.length;i++){
    var sp=spawnPoints[i];
    var sx=sp.x-camera.x;
    var sy=sp.y-camera.y;
    ctx.fillStyle='rgba(239,83,80,0.3)';
    ctx.beginPath();
    ctx.arc(sx,sy,30,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#ef5350';
    ctx.font='12px Arial';
    ctx.textAlign='center';
    ctx.fillText('SPAWN',sx,sy+4);
  }
  
  // Draw player
  var px=player.x-camera.x;
  var py=player.y-camera.y;
  ctx.fillStyle='#4a90d9';
  ctx.beginPath();
  ctx.arc(px,py,18,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#2a6099';
  ctx.beginPath();
  ctx.arc(px,py-5,12,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#ffd700';
  ctx.fillRect(px-3,py-22,6,8);
  ctx.fillStyle='#fff';
  ctx.fillRect(px-8,py-10,4,3);
  ctx.fillRect(px+4,py-10,4,3);
  
  // Draw entities
  for(var i=0;i<enemies.length;i++)enemies[i].draw();
  for(var i=0;i<projectiles.length;i++)projectiles[i].draw();
  for(var i=0;i<particles.length;i++)particles[i].draw();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start
updateHUD();
loop();

// Initial spawn
setTimeout(function(){
  showMessage('Defend against waves!');
},1000);

})();
</script>
