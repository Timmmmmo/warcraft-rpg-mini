<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WarCraft RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;touch-action:none}
#gc{position:fixed;top:0;left:0;width:100%;height:100%;background:#16213e}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<div id="gc"><canvas id="c"></canvas></div>
<script>
(function(){
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){setTimeout(resize,100);});

var COL={bg:'#0d1b2a',hp:'#4caf50',hpbg:'#333',exp:'#2196f3',expbg:'#1a237e',gold:'#ffd700',txt:'#fff',sub:'#b0bec5',dmg:'#ff5252',crit:'#ff6f00',e1:'#ef5350',e2:'#ab47bc',e3:'#ff7043',e4:'#26a69a',boss:'#ffd600',blue:'#42a5f5',darkblue:'#1565c0'};

function rnd(m,n){return m+Math.random()*(n-m);}
function rndInt(m,n){return Math.floor(rnd(m,n+1));}

function Particle(x,y,text,color,size){
  this.x=x;this.y=y;this.text=text;this.color=color;this.size=size||18;this.vy=-2;this.vx=rnd(-1,1);this.alpha=1;this.t=0;
}
Particle.prototype.update=function(dt){
  this.t+=dt;this.y+=this.vy;this.vy+=0.1;this.alpha=Math.max(0,1-this.t/1.5);
  return this.alpha>0;
};
Particle.prototype.draw=function(){
  ctx.save();ctx.globalAlpha=this.alpha;
  ctx.fillStyle=this.color;ctx.strokeStyle='rgba(0,0,0,0.5)';
  ctx.font="bold "+this.size+"px Arial";ctx.textAlign='center';
  ctx.lineWidth=3;ctx.strokeText(this.text,this.x,this.y);ctx.fillText(this.text,this.x,this.y);
  ctx.restore();
};

var EQ={c:[{n:'Iron Sword',a:5,d:0},{n:'Wood Shield',a:0,d:3},{n:'Copper Ring',a:2,d:2}],
       r:[{n:'Steel Sword',a:15,d:0},{n:'Chain Armor',a:0,d:12},{n:'Silver Ring',a:8,d:8}],
       l:[{n:'Dragon Sword',a:50,d:0},{n:'Dragon Armor',a:0,d:40},{n:'Dragon Ring',a:25,d:25}]};
function rollLoot(){if(Math.random()>0.5)return null;var r=Math.random();var p=r<0.1?EQ.l:r<0.4?EQ.r:EQ.c;return p[rndInt(0,p.length-1)];}

var ENEMY=[{n:'Goblin',c:'#66bb6a',hp:40,atk:6,def:2},{n:'Skeleton',c:'#e0e0e0',hp:35,atk:8,def:1},{n:'Orc',c:'#8d6e63',hp:60,atk:10,def:4},{n:'Spider',c:'#26a69a',hp:30,atk:12,def:1}];
var BOSS={n:'Dragon',c:'#ffd600',hp:300,atk:25,def:15};

function drawPlayer(x,y,s){
  var s=s||30;
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle=COL.darkblue;ctx.fillRect(-s*0.4,-s*0.5,s*0.8,s*1);
  ctx.fillStyle=COL.blue;ctx.beginPath();ctx.arc(0,-s*0.7,s*0.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffd700';ctx.fillRect(-s*0.1,-s*1.1,s*0.2,s*0.3);
  ctx.fillStyle='#fff';ctx.fillRect(-s*0.25,-s*0.85,s*0.15,s*0.12);ctx.fillRect(s*0.1,-s*0.85,s*0.15,s*0.12);
  ctx.fillStyle='#1a237e';ctx.fillRect(-s*0.2,-s*0.83,s*0.08,s*0.08);ctx.fillRect(s*0.12,-s*0.83,s*0.08,s*0.08);
  ctx.fillStyle='#0d47a1';ctx.fillRect(-s*0.35,s*0.4,s*0.3,s*0.5);ctx.fillRect(s*0.05,s*0.4,s*0.3,s*0.5);
  ctx.fillStyle='#4e342e';ctx.fillRect(-s*0.35,s*0.85,s*0.3,s*0.2);ctx.fillRect(s*0.05,s*0.85,s*0.3,s*0.2);
  ctx.restore();
}

function drawEnemy(x,y,t,hp,mhp){
  ctx.save();ctx.translate(x,y);
  var c=t.c,s=t.s||25;
  ctx.fillStyle=c;ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(-s*0.3,-s*0.2,s*0.15,0,Math.PI*2);ctx.arc(s*0.3,-s*0.2,s*0.15,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-s*0.3,-s*0.2,s*0.08,0,Math.PI*2);ctx.arc(s*0.3,-s*0.2,s*0.08,0,Math.PI*2);ctx.fill();
  if(hp<mhp){
    var bw=s*2.2,bh=4,by=s*1.3;
    ctx.fillStyle='#333';ctx.fillRect(-bw/2,by,bw,bh);
    ctx.fillStyle=hp/mhp>0.5?'#4caf50':hp/mhp>0.25?'#ff9800':'#f44336';
    ctx.fillRect(-bw/2,by,bw*(hp/mhp),bh);
  }
  ctx.restore();
}

function Game(){
  this.state='tutorial';this.tutorialStep=0;
  this.particles=[];this.enemies=[];
  this.spawnTimer=0;this.spawnInterval=3;this.waveLevel=1;
  this.bossTimer=0;this.bossInterval=60;
  this.autoAtkTimer=0;this.autoAtkInterval=0.8;
  this.lootPopups=[];this.screenShake=0;this.bgOffset=0;
  this.p={hp:100,maxHp:100,atk:10,def:5,level:1,exp:0,expNeed:100,weapon:null,armor:null,kills:0,totalDmg:0};
  this.setupInput();
  this.loadData();
}
Game.prototype.setupInput=function(){
  var self=this;
  canvas.addEventListener('click',function(e){self.onTap(e.clientX,e.clientY);});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();self.onTap(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
};
Game.prototype.onTap=function(x,y){
  if(this.state==='tutorial'){
    this.tutorialStep++;
    if(this.tutorialStep>=3)this.startGame();
  }else if(this.state==='dead'){
    var btnY=H*0.63;
    if(y>btnY&&y<btnY+50){
      if(x<W/2)this.restart();
      else this.state='leaderboard';
    }
  }else if(this.state==='leaderboard'){
    this.restart();
  }
};
Game.prototype.startGame=function(){
  this.state='playing';
  this.enemies=[];this.particles=[];this.spawnTimer=0;this.bossTimer=0;this.waveLevel=1;
};
Game.prototype.restart=function(){
  this.saveData();
  this.p={hp:100,maxHp:100,atk:10,def:5,level:1,exp:0,expNeed:100,weapon:null,armor:null,kills:0,totalDmg:0};
  this.enemies=[];this.particles=[];this.lootPopups=[];
  this.spawnTimer=0;this.bossTimer=0;this.waveLevel=1;
  this.state='playing';
};
Game.prototype.saveData=function(){
  try{localStorage.setItem('warcraftRPG_lb',JSON.stringify(this.p));}catch(e){}
};
Game.prototype.loadData=function(){
  try{
    var d=localStorage.getItem('warcraftRPG_lb');
    if(d){var p=JSON.parse(d);if(p.level>1){this.p=p;this.state='playing';}}
  }catch(e){}
};
Game.prototype.addParticle=function(x,y,text,color,size){
  this.particles.push(new Particle(x,y,text,color,size));
};
Game.prototype.addExp=function(amount){
  this.p.exp+=amount;
  while(this.p.exp>=this.p.expNeed){
    this.p.exp-=this.p.expNeed;
    this.levelUp();
  }
};
Game.prototype.levelUp=function(){
  this.p.level++;
  this.p.expNeed=Math.floor(100*Math.pow(this.p.level,1.5));
  var atkB=Math.floor(this.p.level*1.5),defB=Math.floor(this.p.level*0.8),hpB=this.p.level*20;
  this.p.atk+=atkB;this.p.def+=defB;this.p.maxHp+=hpB;this.p.hp=this.p.maxHp;
  this.addParticle(W/2,H/2,'LEVEL UP! Lv.'+this.p.level,'#ffd700',24);
  this.screenShake=5;
};
Game.prototype.calcDmg=function(atk,def){
  var crit=Math.random()<0.15;
  var base=Math.max(1,atk-def);
  return{d:Math.floor(base*(0.8+Math.random()*0.4)*(crit?2:1)),crit:crit};
};
Game.prototype.playerAttack=function(enemy){
  var r=this.calcDmg(this.p.atk,enemy.atk);
  enemy.hp=Math.max(0,enemy.hp-r.d);
  this.p.totalDmg+=r.d;
  this.addParticle(enemy.x+rnd(-20,20),enemy.y-30,r.crit?'CRIT!'+r.d:'-'+r.d,r.crit?'#ff6f00':'#ff5252',r.crit?20:14);
  if(enemy.hp<=0)this.killEnemy(enemy);
};
Game.prototype.killEnemy=function(enemy){
  this.p.kills++;
  var expGain=Math.floor(enemy.level*50);
  this.addExp(expGain);
  this.addParticle(enemy.x,enemy.y-40,'+'+expGain+'EXP','#2196f3',14);
  var loot=rollLoot();
  if(loot)this.applyLoot(loot,enemy.x,enemy.y);
  this.enemies=this.enemies.filter(function(e){return e!==enemy;});
  this.screenShake=3;
};
Game.prototype.applyLoot=function(item,x,y){
  var equipped=false;
  if(item.a>0&&(!this.p.weapon||item.a>this.p.weapon.a)){
    this.p.weapon=item;this.p.atk+=item.a;equipped=true;
  }else if(item.d>0&&(!this.p.armor||item.d>this.p.armor.d)){
    this.p.armor=item;this.p.def+=item.d;equipped=true;
  }
  var rarity=item.a>40?'LEGEND':item.a>10?'RARE':'NORMAL';
  var txt=item.n+'('+rarity+')'+(equipped?' EQP!':'');
  this.lootPopups.push({txt:txt,color:equipped?'#ffd700':'#b0bec5',timer:2.5});
  this.addParticle(x,y-50,item.n,'#ffd700',14);
};
Game.prototype.enemyAttack=function(enemy){
  var r=this.calcDmg(enemy.atk,this.p.def);
  this.p.hp=Math.max(0,this.p.hp-r.d);
  this.addParticle(W/2+rnd(-20,20),H*0.7,'-'+r.d,'#ff8a80',14);
  this.screenShake=2;
  if(this.p.hp<=0){this.state='dead';this.saveData();}
};
Game.prototype.spawnEnemy=function(isBoss){
  var t=isBoss?BOSS:ENEMY[rndInt(0,ENEMY.length-1)];
  var lv=isBoss?this.waveLevel+5:this.waveLevel+rndInt(0,2);
  var side=Math.random()<0.5?-1:1;
  var x=W/2+side*rnd(W*0.2,W*0.4);
  var y=rnd(H*0.15,H*0.7);
  this.enemies.push({
    x:x,y:y,type:t,
    level:lv,
    hp:Math.floor(t.hp*(1+lv*0.3)),
    maxHp:Math.floor(t.hp*(1+lv*0.3)),
    atk:Math.floor(t.atk+lv*2),
    def:Math.floor(t.def+lv*0.5),
    speed:isBoss?20:rnd(30,50),
    atkTimer:0,atkInterval:isBoss?2:rnd(1.2,2)
  });
};
Game.prototype.update=function(dt){
  if(this.state!=='playing')return;
  this.bgOffset=(this.bgOffset+dt*20)%60;
  this.screenShake=Math.max(0,this.screenShake-dt*5);
  this.spawnTimer+=dt;
  if(this.spawnTimer>=this.spawnInterval){
    this.spawnTimer=0;
    var count=Math.min(1+Math.floor(this.waveLevel/3),3);
    for(var i=0;i<count;i++)this.spawnEnemy(false);
    this.waveLevel=Math.floor(this.p.level*0.8+1);
    this.spawnInterval=Math.max(1.5,3-this.waveLevel*0.1);
  }
  this.bossTimer+=dt;
  if(this.bossTimer>=this.bossInterval){
    this.bossTimer=0;this.spawnEnemy(true);
    this.addParticle(W/2,H*0.2,'BOSS INCOMING!','#ffd600',22);
  }
  this.autoAtkTimer+=dt;
  if(this.autoAtkTimer>=this.autoAtkInterval&&this.enemies.length>0){
    this.autoAtkTimer=0;
    var nearest=null,minDist=Infinity;
    for(var i=0;i<this.enemies.length;i++){
      var e=this.enemies[i];
      var d=Math.sqrt(Math.pow(e.x-W/2,2)+Math.pow(e.y-H*0.75,2));
      if(d<minDist){minDist=d;nearest=e;}
    }
    if(nearest)this.playerAttack(nearest);
  }
  for(var i=0;i<this.enemies.length;i++){
    var e=this.enemies[i];
    var dx=W/2-e.x,dy=H*0.75-e.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>50){e.x+=dx/dist*e.speed*dt;e.y+=dy/dist*e.speed*dt;}
    e.atkTimer+=dt;
    if(e.atkTimer>=e.atkInterval&&dist<60){e.atkTimer=0;this.enemyAttack(e);}
  }
  this.particles=this.particles.filter(function(p){return p.update(dt);});
  for(var i=0;i<this.lootPopups.length;i++)this.lootPopups[i].timer-=dt;
  this.lootPopups=this.lootPopups.filter(function(l){return l.timer>0;});
};
Game.prototype.draw=function(){
  ctx.save();
  if(this.screenShake>0){
    ctx.translate(rnd(-this.screenShake,this.screenShake),rnd(-this.screenShake,this.screenShake));
  }
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0d1b2a');grad.addColorStop(0.5,'#1b2838');grad.addColorStop(1,'#0d1b2a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(100,200,100,0.05)';ctx.lineWidth=1;
  for(var x=-this.bgOffset;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=-this.bgOffset;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  if(this.state==='tutorial')this.drawTutorial();
  else if(this.state==='playing')this.drawGame();
  else if(this.state==='dead'){this.drawGame();this.drawDead();}
  else if(this.state==='leaderboard')this.drawLeaderboard();
  ctx.restore();
};
Game.prototype.drawTutorial=function(){
  var steps=[
    {t:'WAR RPG',d:'Endless monsters,\nEndless fun!'},
    {t:'AUTO BATTLE',d:'Attack auto\nGet EXP & loot'},
    {t:'START NOW',d:'Click to play!\nGood luck!'}
  ];
  var step=steps[Math.min(this.tutorialStep,2)];
  drawPlayer(W/2,H*0.35,40);
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.beginPath();ctx.roundRect(W*0.1,H*0.5,W*0.8,H*0.35,16);ctx.fill();
  ctx.fillStyle='#ffd700';ctx.font="bold "+(W*0.07)+"px Arial";ctx.textAlign='center';
  ctx.fillText(step.t,W/2,H*0.58);
  ctx.fillStyle='#fff';ctx.font=(W*0.04)+"px Arial";
  var lines=step.d.split('\n');
  for(var i=0;i<lines.length;i++)ctx.fillText(lines[i],W/2,H*0.65+i*H*0.06);
  for(var i=0;i<3;i++){
    ctx.fillStyle=i===this.tutorialStep?'#ffd700':'rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.arc(W/2+(i-1)*20,H*0.82,5,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font=(W*0.035)+"px Arial";
  ctx.fillText('TAP TO CONTINUE',W/2,H*0.9);
};
Game.prototype.drawGame=function(){
  for(var i=0;i<this.enemies.length;i++){
    var e=this.enemies[i];
    drawEnemy(e.x,e.y,e.type,e.hp,e.maxHp);
  }
  drawPlayer(W/2,H*0.75,40);
  for(var i=0;i<this.particles.length;i++)this.particles[i].draw();
  for(var i=0;i<this.lootPopups.length;i++){
    var lp=this.lootPopups[i];
    ctx.save();ctx.globalAlpha=Math.min(1,lp.timer);
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.beginPath();
    ctx.roundRect(W*0.1,H*0.35,W*0.8,35,8);ctx.fill();
    ctx.fillStyle=lp.color;ctx.font="bold "+(W*0.038)+"px Arial";ctx.textAlign='center';
    ctx.fillText(lp.txt,W/2,H*0.38+12);ctx.restore();
  }
  this.drawHUD();
};
Game.prototype.drawHUD=function(){
  var pad=10,bw=W-pad*2;
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.beginPath();ctx.roundRect(pad,pad,bw,85,12);ctx.fill();
  ctx.fillStyle='#ffd700';ctx.font="bold "+(W*0.055)+"px Arial";ctx.textAlign='left';
  ctx.fillText('Lv.'+this.p.level,pad+12,pad+26);
  ctx.fillStyle='#b0bec5';ctx.font=(W*0.032)+"px Arial";
  ctx.fillText('Kills:'+this.p.kills,pad+12,pad+48);
  var wt=this.p.weapon?this.p.weapon.n:'No weapon';
  var at=this.p.armor?this.p.armor.n:'No armor';
  ctx.textAlign='right';ctx.fillText(wt,W-pad-12,pad+26);ctx.fillText(at,W-pad-12,pad+48);
  ctx.fillStyle='#b0bec5';ctx.font=(W*0.03)+"px Arial";ctx.textAlign='center';
  ctx.fillText('ATK:'+this.p.atk+' DEF:'+this.p.def,W/2,pad+48);
  var hpY=pad+60;
  ctx.fillStyle='#333';ctx.beginPath();ctx.roundRect(pad+8,hpY,bw-16,10,4);ctx.fill();
  var hpR=this.p.hp/this.p.maxHp;
  ctx.fillStyle=hpR>0.5?'#4caf50':hpR>0.25?'#ff9800':'#f44336';
  ctx.beginPath();ctx.roundRect(pad+8,hpY,(bw-16)*hpR,10,4);ctx.fill();
  ctx.fillStyle='#fff';ctx.font="bold "+(W*0.025)+"px Arial";ctx.textAlign='center';
  ctx.fillText('HP '+this.p.hp+'/'+this.p.maxHp,W/2,hpY+9);
  var expY=hpY+14;
  ctx.fillStyle='#1a237e';ctx.beginPath();ctx.roundRect(pad+8,expY,bw-16,6,3);ctx.fill();
  ctx.fillStyle='#2196f3';ctx.beginPath();
  ctx.roundRect(pad+8,expY,(bw-16)*(this.p.exp/this.p.expNeed),6,3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font=(W*0.022)+"px Arial";
  ctx.fillText('EXP '+this.p.exp+'/'+this.p.expNeed,W/2,expY+5);
  if(this.enemies.length>0){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();
    ctx.roundRect(W-70,H-45,60,32,6);ctx.fill();
    ctx.fillStyle='#ef5350';ctx.font="bold "+(W*0.035)+"px Arial";ctx.textAlign='center';
    ctx.fillText('E:'+this.enemies.length,W-40,H-25);
  }
  var bossLeft=Math.ceil(this.bossInterval-this.bossTimer);
  if(bossLeft<=15){
    ctx.fillStyle=bossLeft<=5?'#f44336':'#ff9800';
    ctx.font="bold "+(W*0.035)+"px Arial";ctx.textAlign='left';
    ctx.fillText('BOSS:'+bossLeft+'s',pad+12,H-25);
  }
};
Game.prototype.drawDead=function(){
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f44336';ctx.font="bold "+(W*0.1)+"px Arial";ctx.textAlign='center';
  ctx.fillText('DEAD',W/2,H*0.28);
  ctx.fillStyle='#fff';ctx.font=(W*0.045)+"px Arial";
  ctx.fillText('Level:'+this.p.level,W/2,H*0.4);
  ctx.fillText('Kills:'+this.p.kills,W/2,H*0.48);
  ctx.fillText('Damage:'+this.p.totalDmg,W/2,H*0.56);
  var btnY=H*0.65;
  ctx.fillStyle='#1565c0';ctx.beginPath();ctx.roundRect(W*0.08,btnY,W*0.38,48,10);ctx.fill();
  ctx.fillStyle='#fff';ctx.font="bold "+(W*0.04)+"px Arial";
  ctx.fillText('RESTART',W*0.27,btnY+30);
  ctx.fillStyle='#6a1b9a';ctx.beginPath();ctx.roundRect(W*0.54,btnY,W*0.38,48,10);ctx.fill();
  ctx.fillText('RANKING',W*0.73,btnY+30);
};
Game.prototype.drawLeaderboard=function(){
  ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffd700';ctx.font="bold "+(W*0.07)+"px Arial";ctx.textAlign='center';
  ctx.fillText('LEADERBOARD',W/2,60);
  ctx.fillStyle='#1565c0';ctx.beginPath();ctx.roundRect(W*0.2,H*0.85,W*0.6,50,10);ctx.fill();
  ctx.fillStyle='#fff';ctx.font="bold "+(W*0.04)+"px Arial";
  ctx.fillText('PLAY AGAIN',W/2,H*0.85+30);
};
Game.prototype.loop=function(ts){
  var dt=Math.min((ts-this.lastTime)/1000,0.05);
  this.lastTime=ts;
  this.update(dt);
  this.draw();
  var self=this;
  requestAnimationFrame(function(t){self.loop(t);});
};
Game.prototype.start=function(){
  var self=this;
  requestAnimationFrame(function(t){self.lastTime=t;self.loop(t);});
};

var game=new Game();game.start();
})();
</script>
</body>
</html>
