<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>йӯ”е…ҪRPG - ж— е°ҪеҲ·жҖӘ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; }
    #gameContainer { position: relative; width: 390px; height: 844px; background: #16213e; border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px rgba(100, 200, 255, 0.3); }
    canvas { display: block; width: 100%; height: 100%; }
    @media (max-width: 430px) { body { background: #1a1a2e; align-items: flex-start; } #gameContainer { width: 100vw; height: 100vh; border-radius: 0; } }
  </style>
</head>
<body>
<div id="gameContainer"><canvas id="gameCanvas"></canvas></div>
<script>
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
function resizeCanvas() { const c = document.getElementById('gameContainer'); canvas.width = c.clientWidth; canvas.height = c.clientHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
const W = () => canvas.width, H = () => canvas.height;
const COL = { bg:'#0d1b2a', pl:'#4fc3f7', e1:'#ef5350', e2:'#ab47bc', e3:'#ff7043', e4:'#26a69a', boss:'#ffd600', hp:'#4caf50', hpbg:'#333', exp:'#2196f3', expbg:'#1a237e', gold:'#ffd700', rare:'#9c27b0', leg:'#ff6f00', com:'#78909c', txt:'#fff', sub:'#b0bec5', dmg:'#ff5252', crit:'#ff6f00' };
function rRange(m,n){return m+Math.random()*(n-m);}
function rInt(m,n){return Math.floor(rRange(m,n+1));}
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

class Particle {
  constructor(x,y,text,color,size=18,vy=-80){this.x=x;this.y=y;this.text=text;this.color=color;this.size=size;this.vy=vy;this.vx=rRange(-20,20);this.alpha=1;this.life=1.2;this.timer=0;}
  update(dt){this.timer+=dt;this.y+=this.vy*dt;this.x+=this.vx*dt;this.vy+=30*dt;this.alpha=Math.max(0,1-this.timer/this.life);return this.timer<this.life;}
  draw(ctx){ctx.save();ctx.globalAlpha=this.alpha;ctx.font=`bold ${this.size}px YaHei`;ctx.fillStyle=this.color;ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=3;ctx.textAlign='center';ctx.strokeText(this.text,this.x,this.y);ctx.fillText(this.text,this.x,this.y);ctx.restore();}
}

const EQ = {
  c:[{id:'sw1',n:'й“Ғеү‘',a:5,d:0,i:'вҡ”пёҸ'},{id:'sh1',n:'жңЁзӣҫ',a:0,d:3,i:'рҹӣЎпёҸ'},{id:'rg1',n:'й“ңжҲ’',a:2,d:2,i:'рҹ’Қ'}],
  r:[{id:'sw2',n:'зІҫй’ўеү‘',a:15,d:0,i:'вҡ”пёҸ'},{id:'ar2',n:'й”Ғз”І',a:0,d:12,i:'рҹӣЎпёҸ'},{id:'rg2',n:'й“¶жҲ’',a:8,d:8,i:'рҹ’Қ'}],
  l:[{id:'sw3',n:'йҫҷзүҷеү‘',a:50,d:0,i:'вҡ”пёҸ'},{id:'ar3',n:'йҫҷйіһз”І',a:0,d:40,i:'рҹӣЎпёҸ'},{id:'rg3',n:'йҫҷйӯӮжҲ’',a:25,d:25,i:'рҹ’Қ'}]
};
function rollLoot(){if(Math.random()>0.55)return null;const r=Math.random();let p=r<0.1?EQ.l:r<0.4?EQ.r:EQ.c;return p[rInt(0,p.length-1)];}

const ENEMY=[
  {n:'е“Ҙеёғжһ—',c:COL.e1,s:22,sh:'goblin',hp:40,atk:6,def:2,exp:1.0},
  {n:'йӘ·й«…',c:COL.e2,s:22,sh:'skeleton',hp:35,atk:8,def:1,exp:1.1},
  {n:'е…Ҫдәә',c:COL.e3,s:26,sh:'orc',hp:60,atk:10,def:4,exp:1.3},
  {n:'иңҳиӣӣ',c:COL.e4,s:20,sh:'spider',hp:30,atk:12,def:1,exp:1.2}
];
const BOSS={n:'йӯ”йҫҷ',c:COL.boss,s:40,sh:'boss',hp:300,atk:25,def:15,exp:5.0};

function drawChar(ctx,x,y,t,fr,hp,mhp,isPl){
  ctx.save();ctx.translate(x,y);const s=t.s;
  if(isPl){
    ctx.fillStyle='#1565c0';ctx.beginPath();ctx.roundRect(-s*0.5,-s*0.6,s,s*1.2,4);ctx.fill();
    ctx.fillStyle='#42a5f5';ctx.beginPath();ctx.arc(0,-s*0.8,s*0.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd700';ctx.fillRect(-s*0.1,-s*1.3,s*0.2,s*0.4);
    ctx.fillStyle='#fff';ctx.fillRect(-s*0.25,-s*0.95,s*0.18,s*0.15);ctx.fillRect(s*0.07,-s*0.95,s*0.18,s*0.15);
    ctx.fillStyle='#1a237e';ctx.fillRect(-s*0.2,-s*0.93,s*0.1,s*0.1);ctx.fillRect(s*0.1,-s*0.93,s*0.1,s*0.1);
    ctx.strokeStyle='#b0bec5';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(s*0.6,-s*0.8);ctx.lineTo(s*0.6,s*0.4);ctx.stroke();
    ctx.fillStyle='#ffd700';ctx.fillRect(s*0.4,-s*0.2,s*0.4,s*0.1);
    ctx.fillStyle='#1565c0';ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-s*0.7,-s*0.5);ctx.lineTo(-s*0.4,-s*0.5);ctx.lineTo(-s*0.4,s*0.2);ctx.lineTo(-s*0.55,s*0.4);ctx.lineTo(-s*0.7,s*0.2);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='#0d47a1';ctx.fillRect(-s*0.4,s*0.55,s*0.35,s*0.5);ctx.fillRect(s*0.05,s*0.55,s*0.35,s*0.5);
    ctx.fillStyle='#4e342e';ctx.fillRect(-s*0.45,s*0.95,s*0.4,s*0.2);ctx.fillRect(s*0.05,s*0.95,s*0.4,s*0.2);
  }else{
    const sh=t.sh;
    if(sh==='goblin'){
      ctx.fillStyle='#66bb6a';ctx.beginPath();ctx.arc(0,-s*0.5,s*0.55,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#388e3c';ctx.beginPath();ctx.roundRect(-s*0.45,-s*0.1,s*0.9,s*0.9,4);ctx.fill();
      ctx.fillStyle='#66bb6a';ctx.beginPath();ctx.moveTo(-s*0.55,-s*0.7);ctx.lineTo(-s*0.9,-s*1.0);ctx.lineTo(-s*0.3,-s*0.7);ctx.fill();
      ctx.beginPath();ctx.moveTo(s*0.55,-s*0.7);ctx.lineTo(s*0.9,-s*1.0);ctx.lineTo(s*0.3,-s*0.7);ctx.fill();
      ctx.fillStyle='#f44336';ctx.beginPath();ctx.arc(-s*0.2,-s*0.55,s*0.12,0,Math.PI*2);ctx.arc(s*0.2,-s*0.55,s*0.12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(-s*0.15,-s*0.3,s*0.1,s*0.15);ctx.fillRect(s*0.05,-s*0.3,s*0.1,s*0.15);
    }else if(sh==='skeleton'){
      ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(0,-s*0.6,s*0.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#bdbdbd';ctx.beginPath();ctx.roundRect(-s*0.35,-s*0.15,s*0.7,s*0.9,3);ctx.fill();
      ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(-s*0.2,-s*0.65,s*0.15,0,Math.PI*2);ctx.arc(s*0.2,-s*0.65,s*0.15,0,Math.PI*2);ctx.fill();
      ctx.fillRect(-s*0.05,-s*0.45,s*0.1,s*0.1);
      ctx.fillStyle='#fff';for(let i=-2;i<=2;i++)ctx.fillRect(i*s*0.1-s*0.04,-s*0.3,s*0.08,s*0.15);
      ctx.strokeStyle='#e0e0e0';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-s*0.35,0);ctx.lineTo(-s*0.7,s*0.3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*0.35,0);ctx.lineTo(s*0.7,s*0.3);ctx.stroke();
    }else if(sh==='orc'){
      ctx.fillStyle='#8d6e63';ctx.beginPath();ctx.arc(0,-s*0.5,s*0.6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6d4c41';ctx.beginPath();ctx.roundRect(-s*0.55,-s*0.05,s*1.1,s*1.1,5);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(-s*0.15,-s*0.25);ctx.lineTo(-s*0.25,-s*0.05);ctx.lineTo(-s*0.05,-s*0.05);ctx.fill();
      ctx.beginPath();ctx.moveTo(s*0.15,-s*0.25);ctx.lineTo(s*0.25,-s*0.05);ctx.lineTo(s*0.05,-s*0.05);ctx.fill();
      ctx.fillStyle='#f44336';ctx.beginPath();ctx.arc(-s*0.22,-s*0.55,s*0.13,0,Math.PI*2);ctx.arc(s*0.22,-s*0.55,s*0.13,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#795548';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(s*0.7,-s*0.8);ctx.lineTo(s*0.7,s*0.5);ctx.stroke();
      ctx.fillStyle='#9e9e9e';ctx.beginPath();ctx.moveTo(s*0.5,-s*0.8);ctx.lineTo(s*0.9,-s*0.8);ctx.lineTo(s*0.7,-s*0.4);ctx.fill();
    }else if(sh==='spider'){
      ctx.fillStyle='#26a69a';ctx.beginPath();ctx.arc(0,0,s*0.55,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#00796b';ctx.beginPath();ctx.arc(0,-s*0.3,s*0.35,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#26a69a';ctx.lineWidth=3;
      for(let i=0;i<4;i++){const a=(i/4)*Math.PI-Math.PI/2;ctx.beginPath();ctx.moveTo(Math.cos(a)*s*0.5,Math.sin(a)*s*0.5);ctx.lineTo(Math.cos(a)*s*1.1,Math.sin(a)*s*0.8+s*0.3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-Math.cos(a)*s*0.5,Math.sin(a)*s*0.5);ctx.lineTo(-Math.cos(a)*s*1.1,Math.sin(a)*s*0.8+s*0.3);ctx.stroke();}
      ctx.fillStyle='#f44336';ctx.beginPath();ctx.arc(-s*0.1,-s*0.35,s*0.08,0,Math.PI*2);ctx.arc(s*0.1,-s*0.35,s*0.08,0,Math.PI*2);ctx.fill();
    }else if(sh==='boss'){
      ctx.fillStyle='#ffd600';ctx.beginPath();ctx.arc(0,0,s*0.7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff6f00';ctx.beginPath();ctx.moveTo(-s*0.5,-s*0.3);ctx.lineTo(-s*1.4,-s*1.0);ctx.lineTo(-s*0.2,-s*0.1);ctx.fill();
      ctx.beginPath();ctx.moveTo(s*0.5,-s*0.3);ctx.lineTo(s*1.4,-s*1.0);ctx.lineTo(s*0.2,-s*0.1);ctx.fill();
      ctx.fillStyle='#ffc107';ctx.beginPath();ctx.arc(0,-s*0.8,s*0.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e65100';ctx.beginPath();ctx.moveTo(-s*0.3,-s*1.2);ctx.lineTo(-s*0.5,-s*1.7);ctx.lineTo(-s*0.1,-s*1.2);ctx.fill();
      ctx.beginPath();ctx.moveTo(s*0.3,-s*1.2);ctx.lineTo(s*0.5,-s*1.7);ctx.lineTo(s*0.1,-s*1.2);ctx.fill();
      ctx.fillStyle='#f44336';ctx.beginPath();ctx.arc(-s*0.2,-s*0.85,s*0.15,0,Math.PI*2);ctx.arc(s*0.2,-s*0.85,s*0.15,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-s*0.17,-s*0.87,s*0.07,0,Math.PI*2);ctx.arc(s*0.23,-s*0.87,s*0.07,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#ffd600';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(s*0.5,s*0.3);ctx.quadraticCurveTo(s*1.2,s*0.8,s*0.8,s*1.3);ctx.stroke();
    }
  }
  if(hp<mhp){
    const bw=s*2.2,bh=5,by=s*1.3;
    ctx.fillStyle=COL.hpbg;ctx.beginPath();ctx.roundRect(-bw/2,by,bw,bh,2);ctx.fill();
    const r=hp/mhp,c=r>0.5?COL.hp:r>0.25?'#ff9800':'#f44336';
    ctx.fillStyle=c;ctx.beginPath();ctx.roundRect(-bw/2,by,bw*r,bh,2);ctx.fill();
  }
  ctx.restore();
}

class Game {
  constructor(){
    this.state='tutorial';this.lastTime=0;this.parts=[];this.enemies=[];this.st=0;this.si=3.0;this.wl=1;this.bt=0;this.bi=60;this.aat=0;this.aaI=0.8;
    this.loots=[];this.ts=0;this.shk=0;this.bgo=0;
    this.p={x:0,y:0,hp:100,mhp:100,atk:10,def:5,lv:1,exp:0,expN:100,w:null,a:null,kills:0,dmg:0};
    this.lb=this.loadLB();this.checkLogin();
    this.setupInput();this.loadGame();this.state='tutorial';
  }
  saveGame(){try{localStorage.setItem('warcraftRPG_save',JSON.stringify({p:this.p}));}catch(e){}}
  loadGame(){try{const d=localStorage.getItem('warcraftRPG_save');if(d){const j=JSON.parse(d);if(j.p)Object.assign(this.p,j.p);}}catch(e){}}
  loadLB(){try{const d=localStorage.getItem('warcraftRPG_lb');return d?JSON.parse(d):[];}catch(e){return [];}}
  saveLB(){try{localStorage.setItem('warcraftRPG_lb',JSON.stringify(this.lb));}catch(e){}}
  checkLogin(){const k='warcraftRPG_login';const t=new Date().toDateString();if(localStorage.getItem(k)!==t){localStorage.setItem(k,t);this.bonus=100;}}
  setupInput(){
    canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const r=canvas.getBoundingClientRect();this.hTap((t.clientX-r.left)*(canvas.width/r.width),(t.clientY-r.top)*(canvas.height/r.height));},{passive:false});
    canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();this.hTap((e.clientX-r.left)*(canvas.width/r.width),(e.clientY-r.top)*(canvas.height/r.height));});
  }
  hTap(x,y){
    if(this.state==='tutorial'){this.ts++;if(this.ts>=3)this.start();return;}
    if(this.state==='dead'){const by=H()*0.65;if(y>by&&y<by+50){if(x<W()/2)this.restart();else this.state='lb';}return;}
    if(this.state==='lb'){this.restart();return;}
  }
  start(){this.state='playing';this.p.x=W()/2;this.p.y=H()*0.55;this.enemies=[];this.st=0;this.bt=0;if(this.bonus){this.grantExp(this.bonus);this.addP(W()/2,H()*0.4,`жҜҸж—ҘеҘ–еҠұ +${this.bonus}EXP`,COL.gold,20);this.bonus=0;}}
  restart(){this.updateLB();this.p.hp=this.p.mhp;this.p.kills=0;this.p.dmg=0;this.enemies=[];this.parts=[];this.loots=[];this.wl=1;this.st=0;this.bt=0;this.state='playing';this.p.x=W()/2;this.p.y=H()*0.55;}
  updateLB(){this.lb.push({lv:this.p.lv,kills:this.p.kills,dmg:this.p.dmg,t:new Date().toLocaleDateString()});this.lb.sort((a,b)=>b.lv-a.lv||b.kills-a.kills);this.lb=this.lb.slice(0,20);this.saveLB();this.saveGame();}
  addP(x,y,txt,c,s=18){this.parts.push(new Particle(x,y,txt,c,s));}
  grantExp(a){this.p.exp+=a;while(this.p.exp>=this.p.expN)this.p.exp-=this.p.expN,this.levelUp();}
  levelUp(){this.p.lv++;this.p.expN=Math.floor(100*Math.pow(this.p.lv,1.5));const ab=Math.floor(this.p.lv*1.5),db=Math.floor(this.p.lv*0.8),hb=this.p.lv*20;this.p.atk+=ab;this.p.def+=db;this.p.mhp+=hb;this.p.hp=this.p.mhp;this.addP(this.p.x,this.p.y-60,`еҚҮзә§! Lv.${this.p.lv}`,'#ffd700',22);this.shk=0.3;this.saveGame();}
  calcDmg(atk,def){const c=Math.random()<0.15;const b=Math.max(1,atk-def);return{d:Math.floor(b*(0.8+Math.random()*0.4)*(c?2:1)),c};}
  pAtk(e){const{d,c}=this.calcDmg(this.p.atk,e.def);e.hp=Math.max(0,e.hp-d);this.p.dmg+=d;this.addP(e.x+rRange(-20,20),e.y-30,c?`рҹ’Ҙ${d}!`:`-${d}`,c?COL.crit:COL.dmg,c?22:16);if(e.hp<=0)this.killE(e);}
  killE(e){this.p.kills++;const eg=Math.floor(e.lv*50*e.exp);this.grantExp(eg);this.addP(e.x,e.y-50,`+${eg}EXP`,COL.exp,14);const l=rollLoot();if(l)this.applyL(l,e.x,e.y);const g=rInt(e.lv*2,e.lv*5);this.addP(e.x+20,e.y-40,`+${g}рҹ’°`,COL.gold,14);this.enemies=this.enemies.filter(x=>x!==e);this.shk=0.15;}
  applyL(item,x,y){let eq=false;if(item.a>0&&(!this.p.w||item.a>this.p.w.a)){this.p.w=item;this.p.atk=this.p.atk-(this.p.w?.a||0)+item.a;eq=true;}else if(item.d>0&&(!this.p.a||item.d>this.p.a.d)){this.p.a=item;this.p.def=this.p.def-(this.p.a?.d||0)+item.d;eq=true;}const rt=item.a>40?'дј иҜҙ':item.a>10?'зЁҖжңү':'жҷ®йҖҡ';const txt=`${item.i}${item.n}(${rt})${eq?' е·ІиЈ…еӨҮ!':''}`;this.loots.push({txt,c:item.c,t:3.0,x:W()/2,y:H()*0.35});this.addP(x,y-60,item.i+item.n,item.c,16);}
  eAtk(e){const{d}=this.calcDmg(e.atk,this.p.def);this.p.hp=Math.max(0,this.p.hp-d);this.addP(this.p.x+rRange(-20,20),this.p.y-40,`-${d}`,'#ff8a80',14);this.shk=0.1;if(this.p.hp<=0){this.state='dead';this.updateLB();}}
  spawnE(boss=false){const t=boss?BOSS:ENEMY[rInt(0,ENEMY.length-1)];const lv=this.wl+rInt(0,2);const s=Math.random()<0.5?-1:1;const x=W()/2+s*rRange(W()*0.2,W()*0.45);const y=rRange(H()*0.25,H()*0.75);this.enemies.push({type:t,x,y,lv,hp:Math.floor(t.hp*(1+lv*0.3)),mhp:Math.floor(t.hp*(1+lv*0.3)),atk:Math.floor(t.atk+lv*2),def:Math.floor(t.def+lv*0.5),spd:boss?40:rRange(50,90),aT:rRange(0,1.5),aI:boss?2.0:rRange(1.2,2.0),boss,fr:0,fT:0});}
  update(dt){if(this.state!=='playing')return;this.bgo=(this.bgo+dt*20)%60;this.shk=Math.max(0,this.shk-dt*3);this.st+=dt;if(this.st>=this.si){this.st=0;const n=Math.min(1+Math.floor(this.wl/3),3);for(let i=0;i<n;i++)this.spawnE();this.wl=Math.floor(this.p.lv*0.8+1);this.si=Math.max(1.5,3-this.wl*0.1);}this.bt+=dt;if(this.bt>=this.bi){this.bt=0;this.spawnE(true);this.addP(W()/2,H()*0.3,'вҡ  BOSSеҮәзҺ°!',COL.boss,24);}this.aat+=dt;if(this.aat>=this.aaI&&this.enemies.length>0){this.aat=0;let ne=null,nd=Infinity;for(const e of this.enemies){const d=dist(this.p,e);if(d<nd){nd=d;ne=e;}}if(ne)this.pAtk(ne);}for(const e of this.enemies){const dx=this.p.x-e.x,dy=this.p.y-e.y,d=Math.sqrt(dx*dx+dy*dy);if(d>55){e.x+=dx/d*e.spd*dt;e.y+=dy/d*e.spd*dt;}e.aT+=dt;if(e.aT>=e.aI&&d<60){e.aT=0;this.eAtk(e);}e.fT+=dt;if(e.fT>0.2){e.fT=0;e.fr=(e.fr+1)%2;}}this.parts=this.parts.filter(p=>p.update(dt));for(const l of this.loots)l.t-=dt;this.loots=this.loots.filter(l=>l.t>0);}
  draw(){
    ctx.save();
    if(this.shk>0)ctx.translate(rRange(-4,4)*this.shk,rRange(-4,4)*this.shk);
    const g=ctx.createLinearGradient(0,0,0,H());g.addColorStop(0,'#0d1b2a');g.addColorStop(0.5,'#1b2838');g.addColorStop(1,'#0d1b2a');ctx.fillStyle=g;ctx.fillRect(0,0,W(),H());
    ctx.strokeStyle='rgba(100,200,100,0.08)';ctx.lineWidth=1;
    for(let x=-this.bgo;x<W();x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H());ctx.stroke();}
    for(let y=-this.bgo;y<H();y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W(),y);ctx.stroke();}
    if(this.state==='tutorial')this.dTut();else if(this.state==='playing')this.dGame();else if(this.state==='dead'){this.dGame();this.dDead();}else if(this.state==='lb')this.dLB();
    ctx.restore();
  }
  dTut(){
    const steps=[{t:'вҡ”пёҸ йӯ”е…ҪRPG',d:'ж— е°ҪеҲ·жҖӘпјҢи¶ҠжҲҳи¶ҠејәпјҒ\nеҚЎйҖҡйЈҺж јпјҢз®ҖеҚ•дёҠжүӢ',i:'рҹҺ®'},{t:'рҹӨ– иҮӘеҠЁжҲҳж–—',d:'иӢұйӣ„иҮӘеҠЁж”»еҮ»\nеҮ»жқҖиҺ·еҫ—з»ҸйӘҢе’ҢиЈ…еӨҮ',i:'вҡ”пёҸ'},{t:'рҹҸҶ жҺ’иЎҢжҰң',d:'жҢ‘жҲҳжӣҙй«ҳзӯүзә§\nзҷ»дёҠжҺ’иЎҢжҰңйЎ¶з«ҜпјҒ\n\nзӮ№еҮ»ејҖе§ӢжёёжҲҸ',i:'рҹҢҹ'}];
    const s=steps[Math.min(this.ts,steps.length-1)];
    drawChar(ctx,W()/2,H()*0.35,{s:35},0,100,100,true);
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.beginPath();ctx.roundRect(W()*0.08,H()*0.52,W()*0.84,H()*0.32,16);ctx.fill();
    ctx.strokeStyle='rgba(100,200,255,0.3)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#ffd700';ctx.font=`bold ${W()*0.065}px YaHei`;ctx.textAlign='center';ctx.fillText(s.t,W()/2,H()*0.58);
    ctx.fillStyle='#fff';ctx.font=`${W()*0.042}px YaHei`;s.d.split('\n').forEach((l,i)=>ctx.fillText(l,W()/2,H()*0.63+i*H()*0.05));
    for(let i=0;i<3;i++){ctx.fillStyle=i===this.ts?'#ffd700':'rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(W()/2+(i-1)*20,H()*0.82,5,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font=`${W()*0.035}px YaHei`;ctx.fillText('зӮ№еҮ»з»§з»ӯ',W()/2,H()*0.87);
  }
  dGame(){
    for(const e of this.enemies)drawChar(ctx,e.x,e.y,e.type,e.fr,e.hp,e.mhp,false);
    drawChar(ctx,this.p.x,this.p.y,{s:35},0,this.p.hp,this.p.mhp,true);
    for(const p of this.parts)p.draw(ctx);
    for(const lp of this.loots){ctx.save();ctx.globalAlpha=Math.min(1,lp.t);ctx.fillStyle='rgba(0,0,0,0.75)';ctx.beginPath();ctx.roundRect(W()*0.1,lp.y-18,W()*0.8,36,8);ctx.fill();ctx.fillStyle=lp.c;ctx.font=`bold ${W()*0.038}px YaHei`;ctx.textAlign='center';ctx.fillText(lp.txt,W()/2,lp.y+6);ctx.restore();}
    this.dHUD();
  }
  dHUD(){
    const pad=12,bw=W()-pad*2;
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.beginPath();ctx.roundRect(pad,pad,bw,90,12);ctx.fill();ctx.strokeStyle='rgba(100,200,255,0.3)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#ffd700';ctx.font=`bold ${W()*0.055}px YaHei`;ctx.textAlign='left';ctx.fillText(`Lv.${this.p.lv}`,pad+12,pad+30);
    ctx.fillStyle=COL.sub;ctx.font=`${W()*0.035}px YaHei`;ctx.fillText(`еҮ»жқҖ: ${this.p.kills}`,pad+12,pad+52);
    const wt=this.p.w?`вҡ”пёҸ${this.p.w.n}`:'вҡ”пёҸж— ';const at=this.p.a?`рҹӣЎпёҸ${this.p.a.n}`:'рҹӣЎпёҸж— ';
    ctx.textAlign='right';ctx.fillStyle=this.p.w?this.p.w.c:COL.sub;ctx.fillText(wt,W()-pad-12,pad+30);ctx.fillStyle=this.p.a?this.p.a.c:COL.sub;ctx.fillText(at,W()-pad-12,pad+52);
    ctx.fillStyle=COL.sub;ctx.font=`${W()*0.032}px YaHei`;ctx.textAlign='center';ctx.fillText(`вҡ”${this.p.atk}  рҹӣЎ${this.p.def}`,W()/2,pad+52);
    const hpY=pad+65;ctx.fillStyle=COL.hpbg;ctx.beginPath();ctx.roundRect(pad+8,hpY,bw-16,10,4);ctx.fill();
    const hr=this.p.hp/this.p.mhp,hc=hr>0.5?COL.hp:hr>0.25?'#ff9800':'#f44336';ctx.fillStyle=hc;ctx.beginPath();ctx.roundRect(pad+8,hpY,(bw-16)*hr,10,4);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${W()*0.028}px YaHei`;ctx.textAlign='center';ctx.fillText(`вқӨпёҸ ${this.p.hp}/${this.p.mhp}`,W()/2,hpY+9);
    const eY=hpY+14;ctx.fillStyle=COL.expbg;ctx.beginPath();ctx.roundRect(pad+8,eY,bw-16,7,3);ctx.fill();ctx.fillStyle=COL.exp;ctx.beginPath();ctx.roundRect(pad+8,eY,(bw-16)*(this.p.exp/this.p.expN),7,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font=`${W()*0.025}px YaHei`;ctx.fillText(`EXP ${this.p.exp}/${this.p.expN}`,W()/2,eY+6);
    if(this.enemies.length>0){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(W()-80,H()-50,70,36,8);ctx.fill();ctx.fillStyle=COL.e1;ctx.font=`bold ${W()*0.038}px YaHei`;ctx.textAlign='center';ctx.fillText(`рҹ‘ҫ ${this.enemies.length}`,W()-45,H()-26);}
    const bl=Math.ceil(this.bi-this.bt);if(bl<=15){ctx.fillStyle=bl<=5?'#f44336':'#ff9800';ctx.font=`bold ${W()*0.038}px YaHei`;ctx.textAlign='left';ctx.fillText(`вҡ  BOSS: ${bl}s`,pad+12,H()-26);}
  }
  dDead(){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W(),H());
    ctx.fillStyle='#f44336';ctx.font=`bold ${W()*0.1}px YaHei`;ctx.textAlign='center';ctx.fillText('рҹ’Җ йҳөдәЎ',W()/2,H()*0.28);
    ctx.fillStyle='#fff';ctx.font=`${W()*0.05}px YaHei`;ctx.fillText(`зӯүзә§: ${this.p.lv}`,W()/2,H()*0.38);ctx.fillText(`еҮ»жқҖ: ${this.p.kills}`,W()/2,H()*0.45);ctx.fillText(`жҖ»дјӨе®і:${this.p.dmg}`,W()/2,H()*0.52);
    const btnY=H()*0.63;
    ctx.fillStyle='#1565c0';ctx.beginPath();ctx.roundRect(W()*0.08,btnY,W()*0.38,50,10);ctx.fill();ctx.fillStyle='#fff';ctx.font=`bold ${W()*0.045}px YaHei`;ctx.textAlign='center';ctx.fillText('?? ЦШРВҝӘКј',W()*0.27,btnY+32);
    ctx.fillStyle='#6a1b9a';ctx.beginPath();ctx.roundRect(W()*0.54,btnY,W()*0.38,50,10);ctx.fill();ctx.fillStyle='#fff';ctx.fillText('?? ЕЕРР°с',W()*0.73,btnY+32);
  }
  dLB(){
    ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,0,W(),H());
    ctx.fillStyle='#ffd700';ctx.font=`bold ${W()*0.07}px YaHei`;ctx.textAlign='center';ctx.fillText('?? ЕЕРР°с',W()/2,60);
    const heads=['ЕЕГы','өИј¶','»чЙұ','ЙЛәҰ'];const cols=[W()*0.1,W()*0.3,W()*0.55,W()*0.78];
    ctx.fillStyle=COL.sub;ctx.font=`${W()*0.038}px YaHei`;heads.forEach((h,i)=>{ctx.textAlign='center';ctx.fillText(h,cols[i],95);});
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,105);ctx.lineTo(W()-20,105);ctx.stroke();
    const lb=this.lb.slice(0,10);const rankC=['#ffd700','#c0c0c0','#cd7f32'];
    lb.forEach((e,i)=>{
      const y=130+i*48;
      ctx.fillStyle=i%2===0?'rgba(255,255,255,0.05)':'transparent';ctx.fillRect(10,y-20,W()-20,44);
      ctx.fillStyle=rankC[i]||COL.sub;ctx.font=`bold ${W()*0.045}px YaHei`;ctx.textAlign='center';ctx.fillText(i<3?['??','??','??'][i]:`#${i+1}`,cols[0],y+8);
      ctx.fillStyle='#fff';ctx.font=`${W()*0.04}px YaHei`;ctx.fillText(`Lv.${e.lv}`,cols[1],y+8);ctx.fillText(e.kills,cols[2],y+8);ctx.fillText(e.dmg>9999?`${(e.dmg/1000).toFixed(1)}k`:e.dmg,cols[3],y+8);
    });
    if(lb.length===0){ctx.fillStyle=COL.sub;ctx.font=`${W()*0.045}px YaHei`;ctx.textAlign='center';ctx.fillText('ФЭОЮјЗВјЈ¬ҝмИҘХҪ¶·°ЙЈЎ',W()/2,H()*0.5);}
    ctx.fillStyle='#1565c0';ctx.beginPath();ctx.roundRect(W()*0.2,H()*0.88,W()*0.6,50,10);ctx.fill();ctx.fillStyle='#fff';ctx.font=`bold ${W()*0.045}px YaHei`;ctx.textAlign='center';ctx.fillText('?? ФЩҙОМфХҪ',W()/2,H()*0.88+32);
  }
  loop(ts){const dt=Math.min((ts-this.lastTime)/1000,0.05);this.lastTime=ts;this.update(dt);this.draw();requestAnimationFrame(t=>this.loop(t));}
  start(){requestAnimationFrame(t=>{this.lastTime=t;this.loop(t);});}
}
const game=new Game();game.start();
</script>
