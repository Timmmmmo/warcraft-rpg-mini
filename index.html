<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>魔兽RPG - 无尽塔防</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Microsoft YaHei',Arial,sans-serif}
#app{position:relative;width:100%;height:100%;background:#0d1b0d}
#game{position:absolute;top:0;left:0;z-index:1}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui>*{pointer-events:auto}
.top{position:absolute;top:0;left:0;width:100%;padding:8px 10px;background:linear-gradient(180deg,rgba(0,0,0,.92),rgba(0,0,0,.6));display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #4a90d9;z-index:20}
.top .item{color:#fff;font-size:11px;display:flex;align-items:center;gap:3px}
.top .val{color:#ffd700;font-weight:bold}
.bot{position:absolute;bottom:0;left:0;width:100%;padding:10px 8px;background:linear-gradient(0deg,rgba(0,0,0,.95),rgba(0,0,0,.7));display:flex;justify-content:center;gap:10px;border-top:2px solid #4a90d9;z-index:20}
.sk{width:68px;height:68px;border-radius:12px;border:3px solid #555;background:linear-gradient(180deg,#2a2a2a,#1a1a1a);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .2s}
.sk.on{border-color:#4a90d9;background:linear-gradient(180deg,#2a4a7a,#1a2a4a);box-shadow:0 0 12px rgba(74,144,217,.5)}
.sk.off{opacity:.4;border-color:#333}
.sk .ic{font-size:24px;line-height:1}.sk .nm{font-size:9px;margin-top:3px;opacity:.9}
.sk .cd{position:absolute;inset:0;background:rgba(0,0,0,.75);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#fff}
.side{position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:15}
.hero-info{background:rgba(0,0,0,.85);border:2px solid #4a90d9;border-radius:12px;padding:10px 8px;width:72px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.5)}
.hero-info .skin{font-size:32px;line-height:1}.hero-info .class-name{font-size:11px;color:#ffd700;margin:4px 0;font-weight:bold}
.hero-info .lv{font-size:10px;color:#ccc;margin-bottom:4px}
.bar{height:5px;background:#222;border-radius:3px;margin:3px 0;overflow:hidden}.bar .fill{height:100%;border-radius:3px;transition:width .3s}
.hp-fill{background:linear-gradient(90deg,#4caf50,#8bc34a)}.mp-fill{background:linear-gradient(90deg,#2196f3,#64b5f6)}.exp-fill{background:linear-gradient(90deg,#ff9800,#ffc107)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column}
.modal.show{display:flex}
.modal h3{color:#ffd700;font-size:22px;margin-bottom:18px;text-shadow:2px 2px 4px #000}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:10px}
.card{width:115px;padding:12px;background:linear-gradient(180deg,#2a2a4a,#1a1a3a);border:3px solid #666;border-radius:12px;cursor:pointer;text-align:center;transition:.3s}
.card:hover{transform:scale(1.05)}.card.auto{border-color:#ff9800;animation:glow 1.5s infinite}
.card .icon{font-size:36px}.card .name{font-size:13px;font-weight:bold;color:#fff;margin:5px 0}.card .bonus{font-size:10px;color:#4caf50}.card .desc{font-size:9px;color:#aaa;margin-top:3px}
.card .level{font-size:10px;color:#4fc3f7;margin:3px 0}.card .time{font-size:9px;color:#ff9800}.card .unlock{font-size:9px;color:#f44336}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,152,0,.5)}50%{box-shadow:0 0 25px rgba(255,152,0,.8)}}
@keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes fadeInUp{from{opacity:0;transform:translate(-50%,-40%)}to{opacity:1;transform:translate(-50%,-50%)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.tutorial-highlight{animation:pulse 1.5s infinite}
.wave-ann{position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);font-size:30px;font-weight:bold;text-shadow:3px 3px 6px #000;display:none;pointer-events:none;z-index:50;text-align:center;color:#ff6f00}
.wave-ann.boss{color:#ff4444;font-size:38px}
.gameover{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;background:rgba(0,0,0,.92)}
.gameover.show{display:flex}.gameover h2{color:#ff4444;font-size:36px;text-shadow:3px 3px 6px #000;margin-bottom:10px}
.gameover .stats{color:#fff;font-size:18px;margin:10px 0}.gameover .reason{color:#ff9800;font-size:14px;margin-bottom:20px}
.gameover button{padding:14px 40px;font-size:18px;background:linear-gradient(180deg,#4a90d9,#2a6099);border:3px solid #6ab0f9;border-radius:25px;color:#fff;cursor:pointer;font-weight:bold}
.toast{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#ffd700;font-size:24px;font-weight:bold;text-shadow:2px 2px 4px #000;display:none;pointer-events:none;z-index:60;white-space:nowrap}
.mid{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:15}
.mid-btn{padding:8px 16px;background:rgba(0,0,0,.8);border:2px solid #555;border-radius:18px;color:#fff;font-size:12px;cursor:pointer}
.mid-btn:hover{border-color:#ffd700}
.move-cd{position:absolute;bottom:145px;left:50%;transform:translateX(-50%);color:#ff6f00;font-size:14px;font-weight:bold;z-index:15;background:rgba(0,0,0,0.8);padding:5px 12px;border-radius:10px;border:2px solid #ff9800;display:none}
.lvl-panel{display:none;margin-top:12px}
.lvl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px;max-width:300px}
.lvl-btn{padding:10px;background:#2a2a4a;border:2px solid #555;border-radius:8px;color:#fff;text-align:center;cursor:pointer;font-size:12px;font-weight:bold}
.lvl-btn:hover{border-color:#ffd700}.lvl-btn.locked{opacity:.35;cursor:not-allowed}
.btns{display:flex;gap:12px;margin-top:15px}
.btns button{padding:10px 22px;background:#2a2a4a;border:2px solid #555;border-radius:12px;color:#fff;cursor:pointer;font-size:12px}
.btns button:hover{border-color:#ffd700}
.lvl-btn.completed{opacity:.5;background:#1a3a1a;border-color:#4caf50;cursor:not-allowed}
.hero-select-scroll{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:10px;max-width:450px}
@media(max-width:400px){.hero-select-scroll{grid-template-columns:repeat(3,1fr);max-width:280px}}
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>
  <div id="ui">
    <div class="top">
      <div class="item">⭐Lv.<span class="val" id="lv">1</span></div>
      <div class="item">💰<span class="val" id="gold">0</span></div>
      <div class="item">🌊W<span class="val" id="wave">1</span></div>
      <div class="item">💀<span class="val" id="kills">0</span></div>
      <div class="item">👹<span class="val" id="enemies">0</span>/100</div>
    </div>
    <div class="side">
      <div class="hero-info">
        <div class="skin" id="class-skin">🗡️</div>
        <div class="class-name" id="class-name">战士</div>
        <div class="lv">Lv.<span id="side-lv">1</span></div>
        <div id="passive-skill" style="font-size:8px;color:#aaa;margin-top:4px;word-wrap:break-word"></div>
        <div class="bar"><div class="fill hp-fill" id="hp-bar" style="width:100%"></div></div>
        <div class="bar"><div class="fill mp-fill" id="mp-bar" style="width:100%"></div></div>
        <div class="bar"><div class="fill exp-fill" id="exp-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="move-cd" id="move-cd"></div>
    <div class="mid"><div class="mid-btn" id="btn-dungeon">⚔️ 副本</div></div>
    <div class="bot">
      <div class="sk on" data-skill="0"><span class="ic">💫</span><span class="nm">小必杀</span></div>
      <div class="sk on" data-skill="1"><span class="ic">⚡</span><span class="nm">大必杀</span></div>
    </div>
    <div class="wave-ann" id="wave-ann"></div>
    <div class="toast" id="toast"></div>
    <div class="gameover" id="gameover">
      <h2>GAME OVER</h2>
      <div class="stats">波次: <span id="go-wave">0</span> | 击杀: <span id="go-kills">0</span></div>
      <div class="reason" id="go-reason"></div>
      <button onclick="location.reload()">再来一局</button>
    </div>
  </div>
  
  <div class="modal" id="promo-modal">
    <h3>✨ 选择转职</h3>
    <div class="cards" id="promo-cards"></div>
    <div style="color:#888;font-size:11px;margin-top:15px">🎲自动+20% | ✋手动+10%</div>
  </div>
  
  <!-- 英雄选择界面 -->
  <div class="modal show" id="hero-select-modal">
    <h3>⚔️ 选择你的英雄</h3>
    <div style="color:#aaa;font-size:12px;margin-bottom:10px;">每位英雄拥有独特必杀技</div>
    <div class="cards" id="hero-select-cards" style="max-width:90vw;max-height:70vh;overflow-y:auto;"></div>
  </div>
  
  <div class="modal" id="dungeon-modal" onclick="if(event.target===this){document.getElementById('dungeon-modal').classList.remove('show');state='playing';}">
    <h3>⚔️ 副本挑战</h3>
    <div class="cards" id="dungeon-list"></div>
    <div class="lvl-panel" id="lvl-panel">
      <div style="color:#aaa;font-size:12px;text-align:center;margin-bottom:8px">选择难度等级</div>
      <div class="lvl-grid" id="lvl-grid"></div>
    </div>
    <div class="btns">
      <button id="btn-lvl">选择等级</button>
      <button id="btn-close-dungeon">关闭</button>
    </div>
  </div>
  
  <!-- 新手教程覆盖层 -->
  <div id="tutorial-overlay" style="display:none;position:fixed;inset:0;z-index:1000;flex-direction:column;align-items:center;justify-content:center;">
    <div style="position:fixed;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(0deg,rgba(0,0,0,0.95),rgba(0,0,0,0.85));border-top:3px solid #ffd700;text-align:center;z-index:1001;animation:fadeInUp 0.3s ease-out;">
      <div id="tut-title" style="color:#ffd700;font-size:20px;font-weight:bold;margin-bottom:10px;text-shadow:0 0 10px rgba(255,215,0,0.5);">⚔️ 欢迎来到魔兽RPG！</div>
      <div id="tut-desc" style="color:#fff;font-size:14px;line-height:1.8;white-space:pre-line;margin-bottom:15px;">在无尽的怪物浪潮中生存下来！\n点击任意位置开始教程</div>
      <div style="display:flex;gap:12px;justify-content:center;align-items:center;">
        <button id="tut-skip" onclick="skipTutorial()" style="padding:10px 20px;background:rgba(255,255,255,0.1);border:2px solid #666;border-radius:20px;color:#999;font-size:13px;cursor:pointer;">跳过教程</button>
        <div id="tut-counter" style="color:#888;font-size:12px;">1/6</div>
        <button id="tut-next" onclick="nextTutorialStep()" style="padding:10px 24px;background:linear-gradient(180deg,#ffd700,#ff9800);border:2px solid #ffe082;border-radius:20px;color:#000;font-size:14px;font-weight:bold;cursor:pointer;animation:pulse 2s infinite;">下一步 ➡️</button>
      </div>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
